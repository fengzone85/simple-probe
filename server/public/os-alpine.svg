<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    <meta name="description" content="A simple server monitor tool." />
    <meta
      name="keywords"
      content="server monitor, Komari Monitor, server uptime monitoring, real-time server status, server performance dashboard, monitoring tool"
    />
    <meta name="author" content="Akizon77" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (() => {
        const parseAppearance = (value) => {
          if (!value) return "system";
          try {
            const parsed = JSON.parse(value);
            return typeof parsed === "string" ? parsed : value;
          } catch {
            return value;
          }
        };

        try {
          const appearance = parseAppearance(localStorage.getItem("appearance"));
          const prefersDark = window.matchMedia?.("(prefers-color-scheme: dark)").matches;
          const isDark = appearance === "dark" || (appearance !== "light" && prefersDark);
          document.documentElement.classList.toggle("dark", isDark);
        } catch {
          document.documentElement.classList.remove("dark");
        }
      })();
    </script>
    <style>
      :where(html) {
        background: #ffffff;
        color-scheme: light;
      }

      :where(html.dark) {
        background: #111111;
        color-scheme: dark;
      }

      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        margin: 0;
      }
    </style>
    
