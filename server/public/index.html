<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>状态页 · Status</title>
  <link rel="stylesheet" href="style.css?v=9" />
</head>
<body>
  <!-- 独立游客公开状态页（无需登录） -->
  <div id="publicView" class="public-view">
    <header class="pv-topbar">
      <div class="pv-brand"><span class="sb-logo">🛰️</span><span class="pv-title" id="pvTitle">自托管监控</span></div>
      <div class="pv-actions">
        <button class="icon-btn" id="pvTheme" title="切换暗亮主题">🌙</button>
        <a class="icon-btn" id="pvGithub" href="https://github.com/fengzone85/simple-probe" target="_blank" rel="noopener" title="GitHub">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M12 2C6.48 2 2 6.48 2 12c0 4.42 2.87 8.17 6.84 9.5.5.09.66-.22.66-.48 0-.24-.01-.87-.01-1.7-2.78.6-3.37-1.34-3.37-1.34-.45-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.89 1.53 2.34 1.09 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.94 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.65 0 0 .84-.27 2.75 1.02.8-.22 1.65-.33 2.5-.33.85 0 1.7.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.38.2 2.4.1 2.65.64.7 1.03 1.59 1.03 2.68 0 3.84-2.34 4.69-4.57 4.94.36.31.68.92.68 1.85 0 1.34-.01 2.42-.01 2.75 0 .27.16.58.67.48A10.01 10.01 0 0 0 22 12c0-5.52-4.48-10-10-10z"/></svg>
        </a>
        <a class="icon-btn" id="pvAdmin" href="/admin.html" title="进入后台">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </a>
      </div>
    </header>
    <div class="pv-content">
      <section class="overview pv-overview" id="pvOverview"></section>
      <div class="toolbar pv-toolbar">
        <span class="toolbar-label">布局</span>
        <button class="btn ghost sm" data-pvlayout="grid">卡片</button>
        <button class="btn ghost sm" data-pvlayout="list">列表</button>
        <span class="toolbar-sep"></span>
        <span class="toolbar-label">模版</span>
        <button class="btn ghost sm" data-pvtemplate="simple">简约</button>
        <button class="btn ghost sm" data-pvtemplate="visual">视觉</button>
      </div>
      <section class="grid pv-grid" id="pvGrid"></section>
      <section class="pv-list" id="pvList" hidden></section>
    </div>
    <footer class="pv-footer" id="pvFooter"></footer>
  </div>
  <div class="toast" id="toast"></div>
  <script src="flags.js?v=8"></script>
  <script src="public.js?v=9"></script>
</body>
</html>
